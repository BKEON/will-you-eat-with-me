<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>나랑 같이 밥먹을래?</title>
<script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
<style>
  :root{
    --pink-deep: #ff6f91;
    --pink-mid: #ffb3c6;
    --pink-light: #fff0f3;
    --cream: #fffaf7;
    --plum: #5b2a3a;
    --gold: #f4a261;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    min-height:100vh;
    font-family:'Pretendard','Apple SD Gothic Neo','Malgun Gothic',sans-serif;
    background:linear-gradient(160deg, var(--pink-light) 0%, var(--pink-mid) 55%, var(--pink-deep) 100%);
    display:flex;
    align-items:center;
    justify-content:center;
    padding:24px;
    color:var(--plum);
    overflow-x:hidden;
  }
  .app{
    width:100%;
    max-width:420px;
    background:var(--cream);
    border-radius:28px;
    box-shadow:0 20px 60px rgba(91,42,58,0.25);
    padding:36px 28px;
    position:relative;
    overflow:hidden;
    min-height:520px;
    display:flex;
    flex-direction:column;
  }
  .app::before{
    content:"";
    position:absolute;
    top:-60px; right:-60px;
    width:160px; height:160px;
    background:radial-gradient(circle, var(--pink-mid) 0%, transparent 70%);
    opacity:0.6;
  }
  .screen{
    display:none;
    flex-direction:column;
    align-items:center;
    text-align:center;
    gap:18px;
    flex:1;
    justify-content:center;
    animation:fadeIn 0.5s ease;
    position:relative;
    z-index:1;
  }
  .screen.active{display:flex;}
  @keyframes fadeIn{
    from{opacity:0; transform:translateY(10px);}
    to{opacity:1; transform:translateY(0);}
  }
  h1,h2{
    margin:0;
    line-height:1.4;
    font-weight:800;
  }
  h1{font-size:1.5rem; color:var(--plum);}
  h2{font-size:1.3rem; color:var(--pink-deep);}
  p{margin:0; font-size:1rem; color:#8a5a68; line-height:1.6;}
  .btn{
    border:none;
    border-radius:999px;
    padding:16px 28px;
    font-size:1rem;
    font-weight:700;
    cursor:pointer;
    width:100%;
    max-width:280px;
    transition:transform 0.15s ease, box-shadow 0.15s ease;
    font-family:inherit;
  }
  .btn:active{transform:scale(0.96);}
  .btn-primary{
    background:var(--pink-deep);
    color:#fff;
    box-shadow:0 8px 20px rgba(255,111,145,0.4);
  }
  .btn-primary:hover{box-shadow:0 10px 26px rgba(255,111,145,0.55); transform:translateY(-2px);}
  .btn-ghost{
    background:transparent;
    color:#b08a95;
    border:2px solid #e8c2cc;
  }
  .btn-ghost:hover{background:#fdeef1;}
  .back-btn{
    position:absolute;
    top:-20px;
    left:-14px;
    background:none;
    border:none;
    color:#b08a95;
    font-size:0.85rem;
    font-weight:600;
    cursor:pointer;
    padding:6px 12px;
    border-radius:999px;
    font-family:inherit;
    z-index:6;
  }
  .back-btn:hover{background:#fdeef1;}
  .dday-badge{
    position:absolute;
    top:-20px;
    right:-14px;
    background:var(--pink-deep);
    color:#fff;
    padding:6px 12px;
    border-radius:14px;
    z-index:6;
    box-shadow:0 4px 12px rgba(255,111,145,0.35);
    display:flex;
    flex-direction:column;
    align-items:center;
    line-height:1.2;
  }
  .dday-label{
    font-size:0.6rem;
    font-weight:600;
    opacity:0.9;
    white-space:nowrap;
  }
  .dday-value{
    font-size:0.85rem;
    font-weight:800;
  }
  #dieBtn{
    position:absolute;
    width:auto;
    max-width:none;
    white-space:nowrap;
    z-index:5;
  }
  .heart-burst{
    position:fixed;
    font-size:1.4rem;
    pointer-events:none;
    animation:floatUp 1.4s ease-out forwards;
    z-index:999;
  }
  @keyframes floatUp{
    0%{opacity:1; transform:translateY(0) scale(1);}
    100%{opacity:0; transform:translateY(-120px) scale(1.4);}
  }
  input[type="date"]{
    width:100%;
    max-width:280px;
    padding:12px 16px;
    border-radius:14px;
    border:2px solid #f2c6d1;
    font-size:1rem;
    font-family:inherit;
    color:var(--plum);
    background:#fff;
  }
  .time-options{
    display:flex;
    gap:10px;
    flex-wrap:wrap;
    justify-content:center;
    width:100%;
  }
  .menu-options{
    display:flex;
    gap:10px;
    flex-wrap:wrap;
    justify-content:center;
    width:100%;
  }
  .custom-menu-row{
    display:flex;
    flex-direction:column;
    gap:10px;
    align-items:center;
    width:100%;
    margin-top:4px;
  }
  .option-btn{
    border:2px solid #f2c6d1;
    background:#fff;
    color:var(--plum);
    padding:12px 18px;
    border-radius:14px;
    font-size:0.95rem;
    font-weight:600;
    cursor:pointer;
    font-family:inherit;
    transition:all 0.15s ease;
  }
  .option-btn.selected{
    background:var(--pink-deep);
    color:#fff;
    border-color:var(--pink-deep);
  }
  .preview-line{
    font-size:1.1rem;
    font-weight:700;
    color:var(--pink-deep);
    min-height:1.6rem;
  }
  .place-input{
    width:100%;
    max-width:280px;
    padding:12px 16px;
    border-radius:14px;
    border:2px solid #f2c6d1;
    font-size:0.95rem;
    font-family:inherit;
    color:var(--plum);
  }
  .place-input::placeholder{color:#c9a2ad;}
  .card{
    width:100%;
    max-width:300px;
    background:linear-gradient(145deg,#fff 0%, #fff0f3 100%);
    border:2px solid var(--pink-mid);
    border-radius:22px;
    padding:26px 22px;
    text-align:left;
    box-shadow:0 12px 30px rgba(255,111,145,0.25);
  }
  .card-title{
    font-size:1.15rem;
    font-weight:800;
    color:var(--pink-deep);
    text-align:center;
    margin-bottom:16px;
  }
  .card-row{
    display:flex;
    justify-content:space-between;
    padding:8px 0;
    border-bottom:1px dashed #f0cdd6;
    font-size:0.95rem;
  }
  .card-row:last-child{border-bottom:none;}
  .card-label{color:#b08a95; font-weight:600;}
  .card-value{color:var(--plum); font-weight:700;}
  .btn-row{
    display:flex;
    flex-direction:column;
    gap:10px;
    width:100%;
    align-items:center;
  }
  #btnRow1{
    flex-direction:row;
    flex-wrap:wrap;
    justify-content:center;
    gap:14px;
  }
  .btn-inline{
    width:auto;
    max-width:none;
  }
  .mascot{
    width:170px;
    height:auto;
    margin-bottom:-8px;
  }
  .mascot-accessory{
    font-size:15px;
  }
  .mascot-small .mascot{
    width:110px;
  }
</style>
</head>
<body>

<div class="app">

  <!-- Screen 1 -->
  <div class="screen active" id="screen1">
    <div class="dday-badge"><span class="dday-label">청년인턴 수료까지</span><span class="dday-value">D-37</span></div>
    <div class="mascot-slot" data-accessory="❓"></div>
    <h1>나랑 같이<br>밥먹을래?? 아님 죽을래??</h1>
    <div class="btn-row" id="btnRow1">
      <button class="btn btn-primary btn-inline" onclick="goTo('screen2')">우리 같이 밥먹자♥</button>
      <button class="btn btn-ghost" id="dieBtn">💀 그냥 죽을래</button>
    </div>
  </div>

  <!-- Screen 2 -->
  <div class="screen" id="screen2">
    <button class="back-btn" onclick="goTo('screen1')">← 이전</button>
    <div class="dday-badge"><span class="dday-label">청년인턴 수료까지</span><span class="dday-value">D-37</span></div>
    <div class="mascot-slot" data-accessory="💕"></div>
    <h2>잠시만....<br>우리 같이 밥먹는거야??</h2>
    <p>나 진짜 너무 감동이야♡♡</p>
    <button class="btn btn-primary" onclick="goTo('screen3')">같이먹자</button>
  </div>

  <!-- Screen 3: date/time -->
  <div class="screen" id="screen3">
    <button class="back-btn" onclick="goTo('screen2')">← 이전</button>
    <div class="dday-badge"><span class="dday-label">청년인턴 수료까지</span><span class="dday-value">D-37</span></div>
    <h2>그래서 언제 먹을까?</h2>
    <p>날짜랑 시간을 골라줘</p>
    <input type="date" id="dateInput" min="2026-07-10" onchange="updatePreview()">
    <div class="time-options">
      <button class="option-btn" data-time="점심" onclick="selectTime(this)">점심</button>
      <button class="option-btn" data-time="저녁" onclick="selectTime(this)">저녁</button>
    </div>
    <div class="preview-line" id="previewLine">날짜와 시간을 골라줘!</div>
    <button class="btn btn-primary" id="confirmDateBtn" onclick="goTo('screen4')" disabled>이 날이 좋아!</button>
  </div>

  <!-- Screen 4: menu -->
  <div class="screen" id="screen4">
    <button class="back-btn" onclick="goTo('screen3')">← 이전</button>
    <div class="dday-badge"><span class="dday-label">청년인턴 수료까지</span><span class="dday-value">D-37</span></div>
    <h2>그래! 이 날 뭐 먹을까?</h2>
    <p>우리 함께라면 뭐든 좋아!</p>
    <div class="menu-options">
      <button class="option-btn" onclick="selectMenu('한식')">#한식</button>
      <button class="option-btn" onclick="selectMenu('중식')">#중식</button>
      <button class="option-btn" onclick="selectMenu('일식')">#일식</button>
      <button class="option-btn" onclick="selectMenu('양식')">#양식</button>
      <button class="option-btn" onclick="selectMenu('분식')">#분식</button>
      <button class="option-btn" onclick="selectMenu('패스트푸드')">#패스트푸드</button>
      <button class="option-btn" onclick="selectMenu('아무거나')">#아무거나</button>
    </div>
    <div class="custom-menu-row">
      <input type="text" id="customMenuInput" class="place-input" placeholder="먹고 싶은 거 직접 적어줘!" onkeydown="if(event.key==='Enter') selectCustomMenu()">
      <button class="btn btn-primary" onclick="selectCustomMenu()">이걸로 할래!</button>
    </div>
  </div>

  <!-- Screen 5: final message + card -->
  <div class="screen" id="screen5">
    <button class="back-btn" onclick="goTo('screen4')">← 이전</button>
    <div class="dday-badge"><span class="dday-label">청년인턴 수료까지</span><span class="dday-value">D-37</span></div>
    <h2>같이 먹으러 가줘서<br>너무 좋다</h2>
    <p>내가 연락할게!</p>
    <div class="card" id="promiseCard">
      <div class="card-title">우리의 밥 약속 💕</div>
      <div class="card-row"><span class="card-label">날짜</span><span class="card-value" id="cardDate">-</span></div>
      <div class="card-row"><span class="card-label">시간</span><span class="card-value" id="cardTime">-</span></div>
      <div class="card-row"><span class="card-label">메뉴</span><span class="card-value" id="cardMenu">-</span></div>
    </div>
    <div class="btn-row">
      <button class="btn btn-primary" onclick="saveAndShare()">약속 공유하기</button>
      <button class="btn btn-ghost" onclick="resetAll()">처음으로 돌아가기</button>
    </div>
  </div>

</div>

<script>
  let selectedTime = null;
  let selectedMenu = null;

  function goTo(id){
    document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
    document.getElementById(id).classList.add('active');
  }

  // 장난스러운 "그냥 죽을래" 버튼 도망 효과
  const dieBtn = document.getElementById('dieBtn');

  function placeDieBtnInitial(){
    const screen1 = document.getElementById('screen1');
    const sRect = screen1.getBoundingClientRect();
    const primaryBtn = screen1.querySelector('.btn-primary');
    const pRect = primaryBtn.getBoundingClientRect();
    const bRect = dieBtn.getBoundingClientRect();

    // 밥먹자 버튼 아래, 여백을 두고 배치 (가운데 정렬)
    let left = (pRect.left - sRect.left) + (pRect.width - bRect.width) / 2;
    let top = (pRect.bottom - sRect.top) + 36;

    const maxLeft = sRect.width - bRect.width - 10;
    left = Math.min(Math.max(left, 10), Math.max(maxLeft, 10));

    dieBtn.style.left = left + 'px';
    dieBtn.style.top = top + 'px';
  }

  function spawnHearts(x, y){
    for(let i=0;i<3;i++){
      const heart = document.createElement('div');
      heart.className = 'heart-burst';
      heart.textContent = '💗';
      heart.style.left = (x + (Math.random()-0.5)*40) + 'px';
      heart.style.top = y + 'px';
      document.body.appendChild(heart);
      setTimeout(()=> heart.remove(), 1400);
    }
  }

  function dodgeDieBtn(pointerX, pointerY){
    const screen1 = document.getElementById('screen1');
    const sRect = screen1.getBoundingClientRect();
    const bRect = dieBtn.getBoundingClientRect();
    const padding = 8;
    const maxLeft = Math.max(sRect.width - bRect.width - padding*2, 0);
    const maxTop = Math.max(sRect.height - bRect.height - padding*2, 0);

    // 현재 버튼 중심 (스크린 기준 좌표)
    const curCx = (bRect.left - sRect.left) + bRect.width/2;
    const curCy = (bRect.top - sRect.top) + bRect.height/2;
    const pointerRelX = pointerX - sRect.left;
    const pointerRelY = pointerY - sRect.top;

    // 마우스가 다가온 반대 방향 벡터
    let dx = curCx - pointerRelX;
    let dy = curCy - pointerRelY;
    let dist = Math.hypot(dx, dy);
    if(dist < 1){
      const angle = Math.random() * Math.PI * 2;
      dx = Math.cos(angle);
      dy = Math.sin(angle);
      dist = 1;
    }
    dx /= dist;
    dy /= dist;

    const escapeDistance = 140 + Math.random()*60;
    let targetCx = curCx + dx * escapeDistance;
    let targetCy = curCy + dy * escapeDistance;

    let newLeft = targetCx - bRect.width/2;
    let newTop = targetCy - bRect.height/2;

    // 화면 밖으로 나가면 반대쪽 여백으로 보정
    if(newLeft < padding || newLeft > padding + maxLeft){
      newLeft = Math.random()*maxLeft + padding;
    }
    if(newTop < padding || newTop > padding + maxTop){
      newTop = Math.random()*maxTop + padding;
    }
    newLeft = Math.min(Math.max(newLeft, padding), padding + maxLeft);
    newTop = Math.min(Math.max(newTop, padding), padding + maxTop);

    dieBtn.style.left = newLeft + 'px';
    dieBtn.style.top = newTop + 'px';
    spawnHearts(pointerX, pointerY);
  }

  function checkProximity(clientX, clientY){
    if(!document.getElementById('screen1').classList.contains('active')) return;
    const bRect = dieBtn.getBoundingClientRect();
    const margin = 6; // 버튼 가장자리에서 살짝만 여유
    const touching = clientX > bRect.left - margin && clientX < bRect.right + margin &&
                      clientY > bRect.top - margin && clientY < bRect.bottom + margin;
    if(touching){
      dodgeDieBtn(clientX, clientY);
    }
  }

  document.addEventListener('mousemove', (e) => checkProximity(e.clientX, e.clientY));
  document.addEventListener('touchstart', (e) => {
    const t = e.touches[0];
    if(t) checkProximity(t.clientX, t.clientY);
  }, {passive:true});
  document.addEventListener('touchmove', (e) => {
    const t = e.touches[0];
    if(t) checkProximity(t.clientX, t.clientY);
  }, {passive:true});

  function mascotDuoSVG(accessory){
    return `
<svg class="mascot" viewBox="0 0 190 100" xmlns="http://www.w3.org/2000/svg">
  <g>
    <path d="M28 66 Q20 18 53 18 Q86 18 78 66 Q78 92 53 92 Q28 92 28 66 Z" fill="#f4a261"/>
    <ellipse cx="32" cy="24" rx="7" ry="10" fill="#f4a261"/>
    <ellipse cx="74" cy="24" rx="7" ry="10" fill="#f4a261"/>
    <path d="M53 18 C58 6 66 2 72 4" stroke="#5b2a3a" stroke-width="2" fill="none"/>
    <polygon points="72,4 76,0 80,4 76,8" fill="#ffd166"/>
    <rect x="40" y="46" width="6" height="15" rx="3" fill="#5b2a3a"/>
    <rect x="60" y="46" width="6" height="15" rx="3" fill="#5b2a3a"/>
    <circle cx="38" cy="63" r="6.5" fill="#ff8fa3" opacity="0.55"/>
    <circle cx="68" cy="63" r="6.5" fill="#ff8fa3" opacity="0.55"/>
    <ellipse cx="18" cy="70" rx="8" ry="13" fill="#f4a261" transform="rotate(-20 18 70)"/>
    <ellipse cx="88" cy="70" rx="8" ry="13" fill="#f4a261" transform="rotate(20 88 70)"/>
    <ellipse cx="40" cy="94" rx="9" ry="7" fill="#f4a261"/>
    <ellipse cx="66" cy="94" rx="9" ry="7" fill="#f4a261"/>
  </g>
  <g transform="translate(88,0)">
    <path d="M28 66 Q20 18 53 18 Q86 18 78 66 Q78 92 53 92 Q28 92 28 66 Z" fill="#ffb3c6"/>
    <ellipse cx="32" cy="24" rx="7" ry="10" fill="#ffb3c6"/>
    <ellipse cx="74" cy="24" rx="7" ry="10" fill="#ffb3c6"/>
    <path d="M53 18 C48 6 40 2 34 4" stroke="#5b2a3a" stroke-width="2" fill="none"/>
    <polygon points="34,4 30,0 26,4 30,8" fill="#ffd166"/>
    <path d="M44 12 Q53 6 62 12 Q62 18 53 18 Q44 18 44 12 Z" fill="#a8c0ff"/>
    <rect x="40" y="46" width="6" height="15" rx="3" fill="#5b2a3a"/>
    <rect x="60" y="46" width="6" height="15" rx="3" fill="#5b2a3a"/>
    <circle cx="38" cy="63" r="6.5" fill="#ff6f91" opacity="0.55"/>
    <circle cx="68" cy="63" r="6.5" fill="#ff6f91" opacity="0.55"/>
    <ellipse cx="18" cy="70" rx="8" ry="13" fill="#ffb3c6" transform="rotate(-20 18 70)"/>
    <ellipse cx="88" cy="70" rx="8" ry="13" fill="#ffb3c6" transform="rotate(20 88 70)"/>
    <ellipse cx="40" cy="94" rx="9" ry="7" fill="#ffb3c6"/>
    <ellipse cx="66" cy="94" rx="9" ry="7" fill="#ffb3c6"/>
  </g>
  ${accessory ? `<text x="95" y="14" text-anchor="middle" class="mascot-accessory">${accessory}</text>` : ''}
</svg>`;
  }

  function renderMascots(){
    document.querySelectorAll('.mascot-slot').forEach(slot => {
      slot.innerHTML = mascotDuoSVG(slot.dataset.accessory || '');
    });
  }

  function updateDday(){
    const target = new Date(2026, 7, 17); // 2026년 8월 17일 (월 인덱스는 0부터 시작)
    const now = new Date();
    const todayMidnight = new Date(now.getFullYear(), now.getMonth(), now.getDate());
    const diffDays = Math.round((target - todayMidnight) / 86400000);

    let text;
    if(diffDays > 0) text = `D-${diffDays}`;
    else if(diffDays === 0) text = 'D-DAY';
    else text = `D+${Math.abs(diffDays)}`;

    document.querySelectorAll('.dday-value').forEach(el => el.textContent = text);
  }

  window.addEventListener('load', updateDday);
  window.addEventListener('load', renderMascots);
  window.addEventListener('load', placeDieBtnInitial);

  function selectTime(btn){
    document.querySelectorAll('.time-options .option-btn').forEach(b => b.classList.remove('selected'));
    btn.classList.add('selected');
    selectedTime = btn.dataset.time;
    updatePreview();
  }

  const days = ['일요일','월요일','화요일','수요일','목요일','금요일','토요일'];

  function updatePreview(){
    const dateVal = document.getElementById('dateInput').value;
    const preview = document.getElementById('previewLine');
    const confirmBtn = document.getElementById('confirmDateBtn');

    if(dateVal && selectedTime){
      const d = new Date(dateVal + 'T00:00:00');
      const text = `${d.getFullYear()}년 ${d.getMonth()+1}월 ${d.getDate()}일 ${days[d.getDay()]} ${selectedTime}`;
      preview.textContent = text;
      confirmBtn.disabled = false;
    } else if(dateVal){
      preview.textContent = '점심/저녁 중 하나를 골라줘!';
      confirmBtn.disabled = true;
    } else {
      preview.textContent = '날짜와 시간을 골라줘!';
      confirmBtn.disabled = true;
    }
  }

  function selectCustomMenu(){
    const input = document.getElementById('customMenuInput');
    const val = input.value.trim();
    if(!val){
      alert('뭐 먹고 싶은지 적어줘!');
      return;
    }
    selectMenu(val);
  }

  function selectMenu(menu){
    selectedMenu = menu;
    fillCard();
    goTo('screen5');
  }

  function fillCard(){
    const dateVal = document.getElementById('dateInput').value;
    const d = new Date(dateVal + 'T00:00:00');
    const dateText = `${d.getFullYear()}년 ${d.getMonth()+1}월 ${d.getDate()}일 (${days[d.getDay()]})`;
    document.getElementById('cardDate').textContent = dateText;
    document.getElementById('cardTime').textContent = selectedTime;
    document.getElementById('cardMenu').textContent = selectedMenu;
  }

  async function saveAndShare(){
    const card = document.getElementById('promiseCard');
    const canvas = await html2canvas(card, {backgroundColor: '#fffaf7', scale: 2});

    canvas.toBlob(async (blob) => {
      const file = new File([blob], 'date-promise.png', {type: 'image/png'});

      if(navigator.canShare && navigator.canShare({files:[file]})){
        try{
          await navigator.share({
            files: [file],
            title: '우리의 밥 약속',
            text: '우리 이 날 밥 먹기로 했어요 💕'
          });
          return;
        }catch(err){
          // 사용자가 공유를 취소한 경우 등 -> 아래 다운로드로 진행
        }
      }
      // 공유 API 미지원 브라우저 -> 이미지 다운로드
      const link = document.createElement('a');
      link.download = 'date-promise.png';
      link.href = canvas.toDataURL('image/png');
      link.click();
      alert('이미지가 저장됐어! 카톡/문자로 보내줘 💌');
    }, 'image/png');
  }

  function resetAll(){
    document.getElementById('dateInput').value = '';
    document.querySelectorAll('.time-options .option-btn').forEach(b => b.classList.remove('selected'));
    document.getElementById('previewLine').textContent = '날짜와 시간을 골라줘!';
    document.getElementById('confirmDateBtn').disabled = true;
    selectedTime = null;
    selectedMenu = null;
    goTo('screen1');
    placeDieBtnInitial();
  }
</script>
</body>
</html>
